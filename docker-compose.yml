services:
  v2ex-bot:
    image: ghcr.io/mskatoni/v2ex-max-helper:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: v2ex-bot
    restart: unless-stopped
    stop_grace_period: 45s
    env_file:
      - .env
    volumes:
      - v2ex-data:/app/data
    environment:
      - TZ=${TZ:-Asia/Shanghai}

    # Linux Docker 访问宿主机 mihomo / sing-box；Docker Desktop 也兼容此别名。
    extra_hosts:
      - "host.docker.internal:host-gateway"

    mem_limit: 2g
    mem_reservation: 512m

    # ===== 安全加固 =====
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=512m

    # 内存限制（防止 Chromium 吃光宿主机）
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  v2ex-data:
